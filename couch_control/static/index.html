<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <title>Couch Control</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- ── Screen container ── -->
    <div id="container">
        <div id="loading">
            <div class="spinner"></div>
            <p id="loading-text">Connecting...</p>
        </div>
        <canvas id="screen"></canvas>
    </div>

    <!-- ── Click indicator ── -->
    <div id="click-indicator"></div>

    <!-- ── Tunnel banner (hidden until tunnel is active) ── -->
    <div id="tunnel-banner" class="hidden">
        <span id="tunnel-icon">🌐</span>
        <span id="tunnel-url-text">Remote access active</span>
        <button id="btn-copy-tunnel" title="Copy tunnel URL">Copy</button>
        <button id="btn-close-tunnel-banner" title="Dismiss">✕</button>
    </div>

    <!-- ── PIN dialog (shown if server requires PIN) ── -->
    <div id="pin-overlay" class="hidden">
        <div id="pin-dialog">
            <h2>🔒 PIN Required</h2>
            <p>Enter the PIN set on the server.</p>
            <input type="password" id="pin-input" inputmode="numeric" maxlength="20"
                placeholder="Enter PIN..." autocomplete="off">
            <div id="pin-error" class="hidden">Incorrect PIN or too many attempts.</div>
            <button id="btn-pin-submit">Connect</button>
        </div>
    </div>

    <!-- ── Keyboard panel ── -->
    <div id="keyboard-panel">
        <input type="text" id="text-input" placeholder="Type here and press Send..."
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div class="key-row">
            <button class="key-btn primary" id="btn-send">Send Text</button>
            <button class="key-btn" data-key="Enter">Enter ↵</button>
            <button class="key-btn" data-key="Backspace">⌫</button>
        </div>
        <div class="key-row">
            <button class="key-btn" data-key="Tab">Tab</button>
            <button class="key-btn" data-key="Escape">Esc</button>
            <button class="key-btn" data-key="ctrl+c">Ctrl+C</button>
            <button class="key-btn" data-key="ctrl+v">Ctrl+V</button>
            <button class="key-btn" data-key="ctrl+z">Ctrl+Z</button>
        </div>
        <div class="key-row">
            <button class="key-btn accent" data-key="ctrl+shift+c">Ctrl+⇧+C</button>
            <button class="key-btn accent" data-key="ctrl+shift+v">Ctrl+⇧+V</button>
            <button class="key-btn" data-key="ctrl+a">Ctrl+A</button>
            <button class="key-btn" data-key="ctrl+x">Ctrl+X</button>
            <button class="key-btn" data-key="ctrl+s">Ctrl+S</button>
        </div>
        <div class="key-row">
            <button class="key-btn" data-key="Up">↑</button>
            <button class="key-btn" data-key="Down">↓</button>
            <button class="key-btn" data-key="Left">←</button>
            <button class="key-btn" data-key="Right">→</button>
            <button class="key-btn" data-key="space">Space</button>
        </div>
        <div class="key-row">
            <button class="key-btn" id="btn-clipboard-paste" title="Paste from phone clipboard">📋 Paste Clipboard</button>
        </div>
    </div>

    <!-- ── Settings panel ── -->
    <div id="settings-panel" class="hidden">
        <div id="settings-content">
            <div class="settings-header">
                <h3>Settings</h3>
                <button id="btn-close-settings">✕</button>
            </div>

            <div class="settings-group">
                <label>Quality</label>
                <input type="range" id="slider-quality" min="10" max="95" step="5" value="70">
                <span id="label-quality">70</span>
            </div>

            <div class="settings-group">
                <label>Resolution</label>
                <select id="select-scale-settings">
                    <option value="0.5">50%</option>
                    <option value="0.75" selected>75%</option>
                    <option value="1.0">100%</option>
                </select>
            </div>

            <div class="settings-group">
                <label>Theme</label>
                <select id="select-theme">
                    <option value="auto">Auto (system)</option>
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>

            <div class="settings-info">
                <div id="info-version"></div>
                <div id="info-clients"></div>
                <div id="info-tunnel"></div>
            </div>
        </div>
    </div>

    <!-- ── Control bar ── -->
    <div id="control-bar">
        <button class="control-btn" id="btn-keyboard" title="Toggle keyboard">
            <span>⌨️</span>
        </button>

        <div class="control-group">
            <button class="control-btn" id="btn-drag" title="Drag/Select mode">
                <span>👆</span>
                <span class="btn-label">Select</span>
            </button>
            <button class="control-btn" id="btn-mode" title="Toggle zoom/control mode">
                <span id="mode-icon">🔍</span>
                <span class="btn-label">Zoom</span>
            </button>
            <button class="control-btn" id="btn-reset" title="Reset view">
                <span>🎯</span>
                <span class="btn-label">Reset</span>
            </button>
        </div>

        <select class="control-select" id="select-quality" title="Quality">
            <option value="40">Low</option>
            <option value="60">Med</option>
            <option value="75" selected>High</option>
            <option value="90">Ultra</option>
        </select>

        <button class="control-btn" id="btn-fullscreen" title="Fullscreen">
            <span>⛶</span>
            <span class="btn-label">Full</span>
        </button>
        <button class="control-btn" id="btn-settings" title="Settings">
            <span>⚙️</span>
        </button>
        <button class="control-btn" id="btn-reconnect" title="Reconnect">
            <span>🔄</span>
        </button>

        <div id="status">
            <span id="status-dot"></span>
            <span id="status-text">Connecting</span>
            <span id="status-fps" class="status-detail"></span>
            <span id="status-ping" class="status-detail"></span>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
